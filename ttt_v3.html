<!DOCTYPE html>
<html lang="en">
  <!-- https://dlonergan.github.io/DGMD28/ttt_v3.html -->  
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGMD E-28: Assignment 4, tic-tac-toe Part 3</title>

    <style>
 
      #main {
        margin-left: auto;
        margin-right: auto;
        text-align: center;
        font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
        max-width: 330px;
      }

      .row {
      }    
          
      .square {
        max-width: 100px;
        min-height: 100px;
        width: 100%;
        border: 1px solid #999;
        display: inline-block;
        box-sizing: border-box;
        margin: 5px;
        vertical-align: top;
        text-align: center;
        font-size: 40px;
        padding-top: 30px; 
      }    


      .square:hover {
         background-color: grey;
      }

      #turn-message {
        font-size: 25px;
        padding-top: 10px;  
        padding-bottom: 10px;  
        border: 1px solid #999;
        width: 120px;
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 20px;
      }    

      #start-button-container {
        margin-top: 20px;  
      }    

      #start-button {
        font-size: 30px;  
      }    

      #game-info-link {
        margin-top: 20px;  
      }    

    </style>

    <script>

      function squareHandler() {
        // console.dir(this);  
        let idx = parseInt(this.id[2]);   
        this.innerHTML = "X";
        alert(idx);    
      } // end squareHandler()      

      window.onload = function() {
        for (i = 0;i<NUM_SQUARES; i++) {
          id = "sq"+i; 
          document.getElementById(id).addEventListener( "click", squareHandler);
        }    
      } // end window onload

    </script>

  </head>
  <body>
    <div id="main">
      <h1>Tic Tac Toe Game</h1>

      <div id="turn-message">X's Turn</div>

      <script>

        //-----------------------------------------------  
        // REQUIREMENT: THIS CODE MAY NOT BE CHANGED!!!!!   
        const NUM_SQUARES = 9; 
        for (i=0; i<NUM_SQUARES; i++) 
        { 
          id = "sq"+i; 
          document.write( "<div class='square' id='" + id + "'></div>" ); 
        } 
        // END OF REQUIREMENT
        //-----------------------------------------------  

      </script>

      <div id="start-button-container"> 
      <button id="start-button">Start Game</button>
      </div> 

      <div id="game-info-link">
        <a target="_blank" 
           href="https://en.wikipedia.org/wiki/Tic-tac-toe">About the game Tic-tac-toe</a>
      </div>

    </div> <!-- main -->
  <body>
</html>
