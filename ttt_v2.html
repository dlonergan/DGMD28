<html lang="en">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGMD E-28: Assignment 3, tic-tac-toe Part 2</title>

    <style>
 
      #main {
        margin-left: auto;
        margin-right: auto;
        text-align: center;
        font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
      }

      .row {
      }    
          
      .square {
        max-width: 100px;
        min-height: 100px;
        width: 100%;
        border: 1px solid #999;
        display: inline-block;
        box-sizing: border-box;
        margin: 5px;
        vertical-align: top;
        text-align: center;
        font-size: 40px;
        padding-top: 30px; 
      }    


      .square:hover {
         background-color: grey;
      }

      #turn-message {
        font-size: 25px;
        padding-top: 10px;  
        padding-bottom: 10px;  
        border: 1px solid #999;
        width: 120px;
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 20px;
      }    

      #start-button-container {
        margin-top: 20px;  
      }    

      #start-button {
        font-size: 30px;  
      }    

      #game-info-link {
        margin-top: 20px;  
      }    

    </style>

  </head>
  <body>
    <div id="main">
      <h1>Tic Tac Toe Game</h1>

      <div id="turn-message">X's Turn</div>

      <script>

        function assignment_requirement(document) {  
        //-----------------------------------------------  
        // REQUIREMENT: THIS CODE MAY NOT BE CHANGED!!!!!   
        const NUM_SQUARES = 9; 
        for (i=0; i<NUM_SQUARES; i++) 
        { 
          id = "sq"+i; 
          document.write( "<div class='square' id='" + id + "'></div>" ); 
        } 
        // END OF REQUIREMENT
        //-----------------------------------------------  
        } // end of function requirement    

        // group the squares into rows without changing the required code
        // by creating a substitute document singleton object
        const mydocument = {
          count: 0, // squares written
          last: 9,  // last square indicator
          write(text) {
            if (this.count == 0) {
              // start first row
              document.write('<div class="row">');
            }    
            // write the parameter  
            document.write(text);
            ++this.count;
            //console.log(this.count);
            if (this.count == 9) {
              // complete last row
              document.write('</div>')
            }
            else if (this.count % 3 == 0) {
              // complete current row, start next row
              document.write('</div><div class="row">');  
            }    
          }    
        }    
        assignment_requirement(mydocument);
      </script>


      <!-- sample X's and O -->   
      <script>
          document.getElementById('sq1').innerHTML = "X";
          document.getElementById('sq2').innerHTML = "X";
          document.getElementById('sq8').innerHTML = "O";
      </script>

      <div id="start-button-container"> 
      <button id="start-button">Start Game</button>
      </div> 

      <div id="game-info-link">
        <a target="_blank" 
           href="https://en.wikipedia.org/wiki/Tic-tac-toe">About the game Tic-tac-toe</a>
      </div>

    </div> <!-- main -->
  <body>
